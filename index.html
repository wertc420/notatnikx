<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Notes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      min-height: 100vh;
      transition: 0.3s;
    }

    .light-mode {
      background: #f5f5f5;
      color: black;
    }

    .phone {
      width: 380px;
      margin: 20px auto;
      background: #1c1c1c;
      border-radius: 35px;
      padding: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
      min-height: 90vh;
      transition: 0.3s;
    }

    .light-mode .phone {
      background: white;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .top-bar h2 {
      font-weight: bold;
    }

    .note {
      background: #ffd54f;
      color: black;
      padding: 15px;
      border-radius: 20px;
      margin-bottom: 15px;
      display: none;
      position: relative;
    }

    .note h5 {
      font-weight: bold;
    }

    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .floating-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 65px;
      height: 65px;
      border-radius: 50%;
      font-size: 30px;
      border: none;
      background: #ffca28;
      color: black;
    }

    #noteForm {
      display: none;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 20px;
    }

    .light-mode #noteForm {
      background: #ececec;
    }

    input, textarea {
      margin-bottom: 10px;
    }

    .done {
      opacity: 0.6;
      text-decoration: line-through;
    }

    table {
      background: white;
      color: black;
      border-radius: 15px;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div class="phone">

  <div class="top-bar">
    <h2>📝 Notatki</h2>
    <button id="themeBtn" class="btn btn-dark">🌙</button>
  </div>

  <div class="mb-3">
    <input type="text" id="searchInput" class="form-control" placeholder="Szukaj notatki...">
  </div>

  <form id="loginForm" class="mb-4">
    <input type="email" name="email" class="form-control" placeholder="Email">
    <input type="password" name="password" class="form-control" placeholder="Hasło">
    <button class="btn btn-warning w-100">Zaloguj</button>
  </form>

  <form id="noteForm">
    <input type="text" id="title" class="form-control" placeholder="Tytuł notatki">
    <textarea id="content" class="form-control" placeholder="Treść notatki"></textarea>

    <button class="btn btn-success w-100">Dodaj notatkę</button>
  </form>

  <div id="notesContainer"></div>

  <div class="mt-4">
    <table id="notesTable" class="display">
      <thead>
        <tr>
          <th>Tytuł</th>
          <th>Treść</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<button class="floating-btn" id="openForm">+</button>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<script>
$(document).ready(function() {

  const table = $('#notesTable').DataTable({
    language: {
      search: 'Szukaj:',
      zeroRecords: 'Brak notatek',
      info: 'Pokazano _TOTAL_ notatek',
      paginate: {
        next: 'Dalej',
        previous: 'Wstecz'
      }
    }
  });

  $('#loginForm').validate({
    rules: {
      email: {
        required: true,
        email: true
      },
      password: {
        required: true,
        minlength: 5
      }
    },
    messages: {
      email: 'Podaj poprawny email',
      password: 'Hasło minimum 5 znaków'
    },
    submitHandler: function() {
      alert('Zalogowano pomyślnie');
    }
  });

  $('#openForm').click(function() {
    $('#noteForm').slideToggle();
  });

  $('#noteForm').submit(function(e) {
    e.preventDefault();

    const title = $('#title').val();
    const content = $('#content').val();

    if(title === '' || content === '') {
      alert('Wypełnij wszystkie pola');
      return;
    }

    const note = `
      <div class="note">
        <h5 class="note-title">${title}</h5>
        <p class="note-content">${content}</p>

        <div class="buttons">
          <button class="btn btn-danger deleteBtn">Usuń</button>
          <button class="btn btn-primary editBtn">Edytuj</button>
          <button class="btn btn-success doneBtn">✓</button>
        </div>
      </div>
    `;

    $('#notesContainer').append(note);

    $('.note').last().fadeIn(500).draggable();

    table.row.add([
      title,
      content
    ]).draw();

    $('#title').val('');
    $('#content').val('');

    $('#noteForm').slideUp();
  });

  $(document).on('click', '.deleteBtn', function() {
    $(this).closest('.note').fadeOut(400, function() {
      $(this).remove();
    });
  });

  $(document).on('click', '.editBtn', function() {
    const note = $(this).closest('.note');

    const newTitle = prompt('Edytuj tytuł', note.find('.note-title').text());
    const newContent = prompt('Edytuj treść', note.find('.note-content').text());

    note.find('.note-title').text(newTitle);
    note.find('.note-content').html(newContent);

    note.animate({
      opacity: 0.5
    }, 200).animate({
      opacity: 1
    }, 200);
  });

  $(document).on('click', '.doneBtn', function() {
    $(this).closest('.note').toggleClass('done');
  });

  $('.note').hover(function() {
    $(this).css('transform', 'scale(1.03)');
  }, function() {
    $(this).css('transform', 'scale(1)');
  });

  $('#searchInput').keyup(function() {
    const value = $(this).val().toLowerCase();

    $('.note').filter(function() {
      $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1);
    });
  });

  $('#themeBtn').click(function() {
    $('body').toggleClass('light-mode');
  });

});
</script>

</body>
</html>
