<script>
$(document).ready(function() {

  const table = $('#notesTable').DataTable({
    language: {
      emptyTable: "Brak notatek w tabeli",
      info: "Wyświetlanie _START_ do _END_ z _TOTAL_ notatek",
      infoEmpty: "Wyświetlanie 0 do 0 z 0 notatek",
      infoFiltered: "(filtrowane z _MAX_ wszystkich notatek)",
      lengthMenu: "Pokaż _MENU_ notatek",
      loadingRecords: "Ładowanie...",
      processing: "Przetwarzanie...",
      search: "Szukaj:",
      zeroRecords: "Nie znaleziono pasujących notatek",
      paginate: {
        first: "Pierwsza",
        last: "Ostatnia",
        next: "Następna",
        previous: "Poprzednia"
      },
      aria: {
        sortAscending: ": aktywuj, aby sortować rosnąco",
        sortDescending: ": aktywuj, aby sortować malejąco"
      }
    }
  });

  $('#loginForm').validate({
    rules: {
      email: {
        required: true,
        email: true
      },
      password: {
        required: true,
        minlength: 5
      }
    },
    messages: {
      email: 'Podaj poprawny adres e-mail',
      password: 'Hasło musi mieć minimum 5 znaków'
    },
    submitHandler: function() {
      alert('Pomyślnie zalogowano do aplikacji!');
    }
  });

  $('#openForm').click(function() {
    $('#noteForm').slideToggle();
  });

  $('#noteForm').submit(function(e) {
    e.preventDefault();

    const title = $('#title').val();
    const content = $('#content').val();

    if(title === '' || content === '') {
      alert('Uzupełnij wszystkie pola formularza!');
      return;
    }

    const note = `
      <div class="note">
        <h5 class="note-title">${title}</h5>
        <p class="note-content">${content}</p>

        <div class="buttons">
          <button class="btn btn-danger deleteBtn">Usuń</button>
          <button class="btn btn-primary editBtn">Edytuj</button>
          <button class="btn btn-success doneBtn">✓</button>
        </div>
      </div>
    `;

    $('#notesContainer').append(note);

    $('.note').last().fadeIn(500).draggable();

    table.row.add([
      title,
      content
    ]).draw();

    $('#title').val('');
    $('#content').val('');

    $('#noteForm').slideUp();
  });

  $(document).on('click', '.deleteBtn', function() {
    $(this).closest('.note').fadeOut(400, function() {
      $(this).remove();
    });
  });

  $(document).on('click', '.editBtn', function() {
    const note = $(this).closest('.note');

    const newTitle = prompt('Nowy tytuł notatki', note.find('.note-title').text());
    const newContent = prompt('Nowa treść notatki', note.find('.note-content').text());

    if (newTitle !== null) {
      note.find('.note-title').text(newTitle);
    }
    if (newContent !== null) {
      note.find('.note-content').text(newContent);
    }

    note.animate({ opacity: 0.5 }, 200).animate({ opacity: 1 }, 200);
  });

  $(document).on('click', '.doneBtn', function() {
    $(this).closest('.note').toggleClass('done');
  });

  $('#searchInput').keyup(function() {
    const value = $(this).val().toLowerCase();

    $('.note').filter(function() {
      $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1);
    });
  });

  $('#themeBtn').click(function() {
    $('body').toggleClass('light-mode');
  });

});
</script>
